<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" x="0px" y="0px"
     viewBox="0 0 32 32" xml:space="preserve">
<defs>
  <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#fbbf24"/>
    <stop offset="100%" stop-color="#d97706"/>
  </linearGradient>
</defs>

<!-- Rounded background, matches the in-game amber gradient treatment. -->
<rect x="1" y="1" width="30" height="30" rx="8" fill="url(#amberGrad)"/>

<!-- Crosshair reticle, dark on amber (same contrast as the sign-in screen mark). -->
<g stroke="#111112" stroke-width="2" stroke-linecap="round" fill="none">
  <circle cx="16" cy="16" r="6.2"/>
  <line x1="16" y1="4.5" x2="16" y2="8.6"/>
  <line x1="16" y1="23.4" x2="16" y2="27.5"/>
  <line x1="4.5" y1="16" x2="8.6" y2="16"/>
  <line x1="23.4" y1="16" x2="27.5" y2="16"/>
</g>
<circle cx="16" cy="16" r="1.4" fill="#111112"/>
</svg>
